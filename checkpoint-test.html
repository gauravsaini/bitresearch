<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint Roundtrip Test</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 2rem;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 { border-bottom: 1px solid #30363d; padding-bottom: .5rem; }
    #status {
      font-weight: 700;
      margin: 1rem 0;
      padding: 1rem;
      background: #161b22;
      border-radius: 6px;
      font-size: 1.1rem;
    }
    #status.pass  { color: #3fb950; }
    #status.fail  { color: #f85149; }
    #status.running { color: #d29922; }
    #logs {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.85rem;
      background: #000;
      color: #8b949e;
      padding: 1rem;
      border-radius: 6px;
      overflow-y: auto;
      max-height: 600px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      padding: .6rem 1.4rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Checkpoint Save → Load Roundtrip Test</h1>
  <p>
    Creates a <code>DistributedTrainer</code>, runs 5 training steps, saves a
    checkpoint, loads it into a fresh trainer, and verifies that all model
    weights, <code>step</code>, <code>lossScale</code>, and
    <code>smoothLoss</code> are faithfully restored.
  </p>
  <button id="runBtn">Run Test</button>
  <div id="status">Idle — click <b>Run Test</b> to begin.</div>
  <div id="logs"></div>

  <script type="module">
    import { runCheckpointTest } from '/src/tests/checkpoint-resume.test.ts';

    const btn     = document.getElementById('runBtn');
    const status  = document.getElementById('status');
    const logsDiv = document.getElementById('logs');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.className = 'running';
      status.textContent = 'Running… (initialising TF.js + model, may take a few seconds)';
      logsDiv.textContent = '';

      try {
        const result = await runCheckpointTest();
        status.className = result.passed ? 'pass' : 'fail';
        status.textContent = result.passed
          ? '✅ PASS — checkpoint roundtrip verified.'
          : '❌ FAIL — see details below.';
        logsDiv.textContent = result.message;
      } catch (err) {
        status.className = 'fail';
        status.textContent = `❌ ERROR — ${err.message ?? err}`;
        logsDiv.textContent = err.stack ?? String(err);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
