<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU P2P Worker — Distributed Training</title>
  <meta name="description" content="Peer-to-peer WebGPU worker for decentralized GPT training via WebRTC">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0b0f;
      --bg-card: rgba(20, 22, 32, 0.85);
      --bg-card-hover: rgba(28, 31, 45, 0.9);
      --text-primary: #e8eaf0;
      --text-secondary: #8b8fa4;
      --text-muted: #565a6e;
      --accent-blue: #4f8cff;
      --accent-green: #34d399;
      --accent-purple: #a78bfa;
      --accent-orange: #fb923c;
      --accent-red: #f87171;
      --accent-cyan: #22d3ee;
      --border-default: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --radius-md: 12px;
      --radius-sm: 8px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 25% 25%, rgba(34, 211, 238, 0.05), transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(167, 139, 250, 0.04), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(52, 211, 153, 0.03), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #p2p-app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 48px;
    }

    /* Header */
    .p2p-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 24px;
    }

    .p2p-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .p2p-logo h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .p2p-logo .gradient-text {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ring-viz {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .ring-viz svg {
      width: 100%;
      height: 100%;
      animation: ringRotate 8s linear infinite;
    }

    @keyframes ringRotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
    }

    .btn:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 16px rgba(34, 211, 238, 0.2);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(34, 211, 238, 0.3);
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.3);
      color: var(--accent-red);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Network Topology Visualization */
    .topology-section {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 20px;
    }

    .topology-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topology-header h2 {
      font-size: 1rem;
      font-weight: 700;
    }

    .ring-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ring-status.waiting {
      background: rgba(251, 146, 60, 0.12);
      color: var(--accent-orange);
      border: 1px solid rgba(251, 146, 60, 0.3);
    }

    .ring-status.formed {
      background: rgba(34, 211, 238, 0.12);
      color: var(--accent-cyan);
      border: 1px solid rgba(34, 211, 238, 0.3);
    }

    .topology-canvas {
      width: 100%;
      height: 200px;
      position: relative;
    }

    #ring-canvas {
      width: 100%;
      height: 100%;
    }

    .peer-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .peer-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: all 200ms;
    }

    .peer-card.is-self {
      border-color: rgba(34, 211, 238, 0.3);
      background: rgba(34, 211, 238, 0.05);
    }

    .peer-card.connected {
      border-color: rgba(52, 211, 153, 0.3);
    }

    .peer-card .peer-id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .peer-card .peer-label {
      font-weight: 600;
      font-size: 0.9rem;
      margin: 4px 0;
    }

    .peer-card .peer-meta {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .peer-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .peer-dot.connected {
      background: var(--accent-green);
    }

    .peer-dot.connecting {
      background: var(--accent-orange);
      animation: pulse 1s ease infinite;
    }

    .peer-dot.self {
      background: var(--accent-cyan);
    }

    .peer-dot.disconnected {
      background: var(--text-muted);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .metric-card:nth-child(1)::before {
      background: linear-gradient(90deg, var(--accent-cyan), transparent);
    }

    .metric-card:nth-child(2)::before {
      background: linear-gradient(90deg, var(--accent-green), transparent);
    }

    .metric-card:nth-child(3)::before {
      background: linear-gradient(90deg, var(--accent-purple), transparent);
    }

    .metric-card:nth-child(4)::before {
      background: linear-gradient(90deg, var(--accent-blue), transparent);
    }

    .metric-card:nth-child(5)::before {
      background: linear-gradient(90deg, var(--accent-orange), transparent);
    }

    .metric-card:nth-child(6)::before {
      background: linear-gradient(90deg, var(--accent-red), transparent);
    }

    .metric-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .metric-card:nth-child(1) .metric-value {
      color: var(--accent-cyan);
    }

    .metric-card:nth-child(2) .metric-value {
      color: var(--accent-green);
    }

    .metric-card:nth-child(3) .metric-value {
      color: var(--accent-purple);
    }

    .metric-card:nth-child(4) .metric-value {
      color: var(--accent-blue);
    }

    .metric-card:nth-child(5) .metric-value {
      color: var(--accent-orange);
    }

    .metric-card:nth-child(6) .metric-value {
      color: var(--accent-red);
    }

    .metric-sub {
      font-size: 0.68rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Loss Chart */
    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }

    .chart-section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    #p2p-loss-chart {
      width: 100%;
      height: 200px;
    }

    /* Training Log */
    .log-section {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 20px;
    }

    .log-section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .log-container {
      max-height: 260px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      line-height: 1.7;
    }

    .log-entry {
      padding: 2px 0;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }

    .log-entry.p2p {
      color: var(--accent-cyan);
    }

    .log-entry.train {
      color: var(--accent-green);
    }

    .log-entry.error {
      color: var(--accent-red);
    }

    .log-entry.ar {
      color: var(--accent-purple);
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .peer-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="p2p-app">
    <!-- Header -->
    <header class="p2p-header">
      <div class="p2p-logo">
        <div class="ring-viz">
          <svg viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="18" fill="none" stroke="rgba(34, 211, 238, 0.3)" stroke-width="2" />
            <circle cx="24" cy="24" r="18" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="20 93"
              stroke-linecap="round" />
            <circle cx="24" cy="6" r="4" fill="#22d3ee" />
            <circle cx="42" cy="24" r="3" fill="#a78bfa" />
            <circle cx="24" cy="42" r="3" fill="#34d399" />
            <circle cx="6" cy="24" r="3" fill="#fb923c" />
            <defs>
              <linearGradient id="ringGrad" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#22d3ee" />
                <stop offset="100%" stop-color="#a78bfa" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1><span class="gradient-text">BitResearch</span> P2P Trainer</h1>
      </div>
      <div class="header-controls">
        <button class="btn btn-primary" id="btn-start" onclick="startTraining()">▶ Start Training</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopTraining()" disabled>⏹ Stop</button>
      </div>
    </header>

    <!-- Metrics -->
    <section class="metrics-grid" id="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Training Step</div>
        <div class="metric-value" id="m-step">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Loss</div>
        <div class="metric-value" id="m-loss">—</div>
        <div class="metric-sub" id="m-smooth-loss"></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Peers Connected</div>
        <div class="metric-value" id="m-peers">0</div>
        <div class="metric-sub">via WebRTC</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Throughput</div>
        <div class="metric-value" id="m-tps">—</div>
        <div class="metric-sub">tokens/sec</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">All-Reduce</div>
        <div class="metric-value" id="m-ar">— ms</div>
        <div class="metric-sub">per step</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Gradient Norm</div>
        <div class="metric-value" id="m-grad-norm">—</div>
        <div class="metric-sub">L2 magnitude</div>
      </div>
    </section>

    <!-- Network Topology -->
    <section class="topology-section">
      <div class="topology-header">
        <h2>🌐 Ring Topology</h2>
        <span class="ring-status waiting" id="ring-status">Waiting for peers</span>
      </div>
      <div class="topology-canvas">
        <canvas id="ring-canvas"></canvas>
      </div>
      <div class="peer-cards" id="peer-cards">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Observability Dashboard -->
    <section class="chart-section">
      <h2>📊 Training Telemetry</h2>
      <div style="height: 350px; width: 100%;">
        <canvas id="metricsChart"></canvas>
      </div>
    </section>

    <!-- Log -->
    <section class="log-section">
      <h2>📋 Training Log</h2>
      <div class="log-container" id="p2p-log"></div>
    </section>
  </div>

  <script type="module">
    import { DistributedTrainer } from '/src/distributed/trainer.ts';
    import { Dashboard } from '/src/client/dashboard.ts';
    import { estimateParams } from '/src/model/config.ts';

    // ── URL Param Parsing ───────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const autoStart = params.has('autoStart') || params.get('auto') === '1';
    const hideUI = params.has('hideUI') || params.get('noui') === '1';
    const maxSteps = parseInt(params.get('maxSteps') || '0') || Infinity;
    const maxSeconds = parseInt(params.get('maxSeconds') || params.get('timeout') || '0') || Infinity;
    const peerCount = parseInt(params.get('peers') || '0') || 0;

    const parseStringParam = (name, fallback = '') => {
      const value = params.get(name);
      return value && value.trim() ? value.trim() : fallback;
    };
    const parseIntParam = (name, fallback = undefined) => {
      const value = params.get(name);
      if (value === null || value.trim() === '') return fallback;
      const parsed = Number.parseInt(value, 10);
      return Number.isFinite(parsed) ? parsed : fallback;
    };
    const parseBoolParam = (name, fallback = false) => {
      const value = params.get(name);
      if (value === null) return fallback;
      if (value === '' || value === '1' || value.toLowerCase() === 'true' || value.toLowerCase() === 'yes') {
        return true;
      }
      if (value === '0' || value.toLowerCase() === 'false' || value.toLowerCase() === 'no') {
        return false;
      }
      return fallback;
    };
    const parseDataFormat = (value, fallback = 'auto') => {
      if (value === 'tokens' || value === 'documents' || value === 'auto') {
        return value;
      }
      return fallback;
    };

    const explicitDataSource = params.has('dataUrl') || params.has('documentsUrl') || params.has('artifactBaseUrl') || params.has('tokenBytesUrl') || params.has('manifestUrl');
    const artifactBaseUrl = parseStringParam('artifactBaseUrl', explicitDataSource ? '' : '/data/parity/');
    const dataFormat = parseDataFormat(params.get('dataFormat'), artifactBaseUrl ? 'documents' : 'auto');
    const manifestUrl = parseStringParam('manifestUrl', '');
    const dataUrl = parseStringParam('dataUrl', '');
    const documentsUrl = parseStringParam('documentsUrl', '');
    const tokenBytesUrl = parseStringParam('tokenBytesUrl', '');
    const bosTokenId = parseIntParam('bosTokenId');
    const documentBufferSize = parseIntParam('documentBufferSize');
    const documentsAreBOSPrefixed = parseBoolParam('documentsAreBOSPrefixed', false);

    // ── Headless Mode: hide all UI except log ───────────────────
    if (hideUI) {
      document.querySelector('.p2p-header .header-controls')?.setAttribute('style', 'display:none');
      document.querySelector('.metrics-grid')?.setAttribute('style', 'display:none');
      document.querySelector('.topology-section')?.setAttribute('style', 'display:none');
      document.querySelector('.chart-section')?.setAttribute('style', 'display:none');
      document.querySelector('.p2p-header')?.setAttribute('style', 'padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)');
      document.querySelector('.log-section')?.setAttribute('style', 'background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px;');
      document.querySelector('.log-container')?.setAttribute('style', 'max-height:100vh;overflow-y:auto;');
    }

    let trainer = null;
    let dashboard = null;
    if (!hideUI) {
      dashboard = new Dashboard('metricsChart');
    }

    // Make functions available globally
    window.startTraining = startTraining;
    window.stopTraining = stopTraining;

    function addLog(msg, type = '') {
      const log = document.getElementById('p2p-log');
      if (!log) return;
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${msg}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      while (log.children.length > 200) log.removeChild(log.firstChild);
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function drawRingTopology(ring, peers) {
      const canvas = document.getElementById('ring-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const w = rect.width;
      const h = rect.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.min(w, h) * 0.35;

      ctx.clearRect(0, 0, w, h);

      if (!ring) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = '14px Inter';
        ctx.textAlign = 'center';
        ctx.fillText('Waiting for peers to form ring...', cx, cy);
        return;
      }

      const N = ring.totalPeers;
      const positions = [];

      for (let i = 0; i < N; i++) {
        const angle = (2 * Math.PI * i / N) - Math.PI / 2;
        positions.push({
          x: cx + radius * Math.cos(angle),
          y: cy + radius * Math.sin(angle),
        });
      }

      // Draw ring connections
      ctx.strokeStyle = 'rgba(34, 211, 238, 0.15)';
      ctx.lineWidth = 2;
      for (let i = 0; i < N; i++) {
        const from = positions[i];
        const to = positions[(i + 1) % N];
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
      }

      // Animated data flow arrows
      const time = Date.now() / 1000;
      for (let i = 0; i < N; i++) {
        const from = positions[i];
        const to = positions[(i + 1) % N];
        const t = ((time * 0.5 + i * 0.3) % 1);
        const ax = from.x + (to.x - from.x) * t;
        const ay = from.y + (to.y - from.y) * t;

        ctx.beginPath();
        ctx.arc(ax, ay, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(34, 211, 238, ${0.5 + 0.5 * Math.sin(t * Math.PI)})`;
        ctx.fill();
      }

      // Draw nodes
      for (let i = 0; i < N; i++) {
        const pos = positions[i];
        const isSelf = i === ring.self;
        const nodeRadius = isSelf ? 14 : 10;

        // Glow
        if (isSelf) {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, nodeRadius + 6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(34, 211, 238, 0.1)';
          ctx.fill();
        }

        // Node
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, nodeRadius, 0, Math.PI * 2);
        const colors = ['#22d3ee', '#34d399', '#a78bfa', '#fb923c', '#f87171', '#4f8cff'];
        ctx.fillStyle = isSelf ? '#22d3ee' : colors[i % colors.length];
        ctx.fill();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = `${isSelf ? '11' : '9'}px JetBrains Mono`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isSelf ? 'ME' : `P${i}`, pos.x, pos.y);

        // Position label below
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '9px Inter';
        ctx.fillText(`#${i}`, pos.x, pos.y + nodeRadius + 12);
      }
    }

    async function startTraining() {
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      if (btnStart) btnStart.disabled = true;
      if (btnStop) btnStop.disabled = false;

      addLog('Initializing distributed trainer...', 'p2p');

      trainer = new DistributedTrainer({
        batchSize: 2,
        learningRate: 0.001,
        signalingUrl: `ws://${location.hostname}:8788`,
        artifactBaseUrl: artifactBaseUrl || undefined,
        manifestUrl: manifestUrl || undefined,
        dataUrl: dataUrl || undefined,
        documentsUrl: documentsUrl || undefined,
        dataFormat,
        tokenBytesUrl: tokenBytesUrl || undefined,
        bosTokenId: Number.isFinite(bosTokenId) ? bosTokenId : undefined,
        documentBufferSize: Number.isFinite(documentBufferSize) ? documentBufferSize : undefined,
        documentsAreBOSPrefixed,
        modelConfig: {
          sequenceLen: 256,
          vocabSize: 4096,
          nLayer: 2,
          nHead: 4,
          nKvHead: 4,
          nEmbd: 128,
          windowPattern: 'L',
        },
      });

      addLog(
        `Data config: base=${artifactBaseUrl || '—'} manifest=${manifestUrl || '—'} data=${dataUrl || '—'} docs=${documentsUrl || '—'} format=${dataFormat}`,
        'p2p',
      );

      trainer.onLog = (msg) => {
        const type = msg.includes('[P2P]') || msg.includes('[AR]') ? 'p2p' :
          msg.includes('Step') ? 'train' :
            msg.includes('❌') ? 'error' : '';
        addLog(msg, type);
        // In headless mode, also output to console for capture
        if (hideUI) console.log(msg);
      };

      trainer.onMetricsUpdate = (m) => {
        if (dashboard) dashboard.update(m);

        // Enforce maxSteps / maxSeconds limits
        if (maxSteps !== Infinity && m.step >= maxSteps) {
          addLog(`🏁 Reached maxSteps=${maxSteps}, stopping.`, 'train');
          trainer.stop();
          trainer.evaluateBpb().then(() => printSummary(m));
        }
        if (maxSeconds !== Infinity && m.elapsedSeconds >= maxSeconds) {
          addLog(`🏁 Reached maxSeconds=${maxSeconds}, stopping.`, 'train');
          trainer.stop();
          trainer.evaluateBpb().then(() => printSummary(m));
        }
      };

      // Update ring visualization periodically (only if UI visible)
      if (!hideUI) {
        setInterval(() => {
          if (trainer) {
            const mesh = trainer['mesh'];
            drawRingTopology(mesh?.topology, mesh?.getPeerInfos());

            const statusEl = document.getElementById('ring-status');
            if (mesh?.topology) {
              statusEl.className = 'ring-status formed';
              statusEl.textContent = `Ring: ${mesh.topology.totalPeers} peers`;
            }

            updatePeerCards(mesh);
          }
        }, 500);
      }

      try {
        await trainer.startTraining();
      } catch (e) {
        addLog(`Error: ${e}`, 'error');
      }
    }

    function computeMFU(numParams, seqLen, batchSize, numSteps, trainingSecs) {
      // Approximate: 6 FLOPs per param per token (fwd + bwd)
      // Conservative WebGPU TFLOPS estimate
      const PEAK_TFLOPS = 10; // approximate — adjust per known GPU
      const flopsPerStep = 6 * numParams * seqLen * batchSize;
      const achievedFlopsPerSec = (flopsPerStep * numSteps) / trainingSecs;
      return (achievedFlopsPerSec / (PEAK_TFLOPS * 1e12)) * 100;
    }

    function printSummary(m) {
      const mem = performance?.memory ? (performance.memory.usedJSHeapSize / 1073741824).toFixed(1) : '0.0';
      const cfg = trainer.config.modelConfig;
      const numParams = estimateParams(cfg);
      const totalSeconds = m.elapsedSeconds; // includes overhead
      const mfu = computeMFU(numParams, cfg.sequenceLen, trainer.config.batchSize, m.step, m.elapsedSeconds);
      const valBpb = trainer.valBpb || 0;
      const summary = [
        '---',
        `val_bpb:          ${valBpb.toFixed(6)}`,
        `val_loss:         ${m.smoothLoss.toFixed(6)}`,
        `training_seconds: ${m.elapsedSeconds.toFixed(1)}`,
        `total_seconds:    ${totalSeconds.toFixed(1)}`,
        `mfu_percent:      ${mfu.toFixed(2)}`,
        `tokens_per_sec:   ${Math.floor(m.tokensPerSec)}`,
        `total_tokens_M:   ${(m.totalTokens / 1e6).toFixed(1)}`,
        `num_steps:        ${m.step}`,
        `num_params_M:     ${(numParams / 1e6).toFixed(1)}`,
        `depth:            ${cfg.nLayer}`,
        `peers:            ${m.peersConnected}`,
        `all_reduce_ms:    ${m.allReduceTimeMs.toFixed(1)}`,
        `grad_norm:        ${m.gradNorm.toFixed(4)}`,
        '---'
      ].join('\n');
      addLog(summary, 'train');
      console.log(summary);
    }

    function stopTraining() {
      if (trainer) {
        trainer.stop();
        if (trainer.metrics) {
          trainer.evaluateBpb().then(() => printSummary(trainer.metrics));
        }
        trainer = null;
      }
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      if (btnStart) btnStart.disabled = false;
      if (btnStop) btnStop.disabled = true;
      addLog('Training stopped', 'train');
    }

    function updatePeerCards(mesh) {
      const container = document.getElementById('peer-cards');
      if (!container || !mesh) return;

      const peers = mesh.getPeerInfos();
      const ring = mesh.topology;

      let html = '';

      html += `
        <div class="peer-card is-self">
          <div class="peer-id">${mesh.peerId.slice(-8)}</div>
          <div class="peer-label"><span class="peer-dot self"></span>This Worker (You)</div>
          <div class="peer-meta">Position: ${ring ? `#${ring.self}` : '—'}</div>
        </div>
      `;

      for (const peer of peers) {
        const stateClass = peer.state === 'connected' ? 'connected' : peer.state;
        html += `
          <div class="peer-card ${stateClass}">
            <div class="peer-id">${peer.peerId.slice(-8)}</div>
            <div class="peer-label"><span class="peer-dot ${peer.state}"></span>${peer.state}</div>
            <div class="peer-meta">
              ↓ ${(peer.bytesReceived / 1024).toFixed(0)}KB |
              ↑ ${(peer.bytesSent / 1024).toFixed(0)}KB
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    // ── Auto-Start Logic ────────────────────────────────────────
    if (autoStart) {
      addLog('Auto-start enabled. Starting training...', 'p2p');
      // Small delay to let signaling server connect first
      setTimeout(() => startTraining(), 2000);
    } else {
      addLog('BitSearch loaded. Click "Start Training" to begin.', 'p2p');
    }
  </script>
</body>

</html>
